// ── ESPN helpers ──
function parseRecord(t){const items=t?.record?.items||[];for(const i of items){if(i.summary)return i.summary;}return null;}
function parseCoach(t){for(const c of(t?.coaches||[])){const n=c?.coach?.fullName||c?.fullName||c?.displayName;if(n&&!n.includes("undefined"))return n;}return null;}
function parseGame(sb,tid){
  for(const ev of(sb?.events||[])){
    const comp=ev.competitions?.[0];if(!comp)continue;
    const involved=comp.competitors?.some(c=>String(c.team?.id)===String(tid));if(!involved)continue;
    const[c1,c2]=comp.competitors;
    const status=ev.status?.type?.description||"";
    const n1=c1?.team?.shortDisplayName||"?",n2=c2?.team?.shortDisplayName||"?";
    const isFinal=status.toLowerCase().includes("final"),isLive=status.toLowerCase().includes("progress");
    if(isFinal)return`${n1} ${c1.score} – ${n2} ${c2.score} · Final`;
    if(isLive)return`🔴 LIVE: ${n1} ${c1.score} – ${n2} ${c2.score}`;
    const date=ev.date?new Date(ev.date).toLocaleDateString("en-US",{month:"short",day:"numeric"}):"";
    return`Next: ${n1} vs ${n2} · ${date}`;
  }return null;
}
async function loadTeamData(team) {
  const [sp, lg] = team.espn.split("/");
  const scorePath = `sports/${sp}/${lg}/scoreboard`;

  const [tr, sr, nr, pr, tsr] = await Promise.all([
    fetch(`${PROXY}/team/${sp}/${lg}/${team.id}`).then(r => r.json()).catch(() => null),
    fetch(`${PROXY}/espn?path=${encodeURIComponent(scorePath)}`).then(r => r.json()).catch(() => null),
    fetch(`${PROXY}/news/${sp}/${lg}/${team.id}`).then(r => r.json()).catch(() => null),
    fetch(`${PROXY}/players/${sp}/${lg}/${team.id}`).then(r => r.json()).catch(() => null),
    fetch(`${PROXY}/teamstats/${sp}/${lg}/${team.id}`).then(r => r.json()).catch(() => null),
  ]);

  const td = tr?.team || tr || {};
  const statArr = td.record?.items?.[0]?.stats || [];
  const coach = td._headCoach || null;

  const articles = (nr?.articles || []).slice(0, 6).map(a => ({
    headline: a.headline || a.title || "",
    link: a.links?.web?.href || a.link || a.url || null,
    desc: a.description || a.summary || "",
    published: a.published ? new Date(a.published).toLocaleDateString("en-US", { month: "short", day: "numeric" }) : null,
  })).filter(a => a.headline);

  // Players come pre-parsed from proxy
  const players = pr?.players || [];

  return {
    record: parseRecord(td),
    standing: td.standingSummary || null,
    coach,
    venue: td.venue?.fullName || null,
    logo: td.logos?.[0]?.href || null,
    game: sr ? parseGame(sr, team.id) : null,
    pct: statArr.find(s => s.name === "winPercent")?.displayValue || null,
    articles,
    players,
    teamStats: tsr?.categories || [],
    teamStatsYear: tsr?.year || null,
    _playersMeta: pr ? `Roster: ${pr._rosterCount || pr._total || "?"} athletes` : "No response",
  };
}

                </div>

                {/* Hero */}
                <div style={{background:"linear-gradient(135deg,"+tc+"22,#080808)",border:"1px solid "+tc+"44",borderTop:"4px solid "+tc,borderRadius:"14px",padding:"22px 24px",marginBottom:"14px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:"16px"}}>
                    {live?.logo&&<img src={live.logo} alt="" style={{width:"54px",height:"54px",objectFit:"contain",filter:"drop-shadow(0 0 8px rgba(255,255,255,0.15))"}}/>}
                    <div style={{flex:1}}>
                      <div style={{fontSize:"11px",fontFamily:"monospace",color:ac,letterSpacing:"0.2em",marginBottom:"4px"}}>{sel.sport} · LIVE ESPN</div>
                      <div style={{fontSize:"24px",fontWeight:"900",lineHeight:1.1,color:"#f0ece4"}}>{sel.name}</div>
                      {live?.standing&&<div style={{marginTop:"5px",fontSize:"12px",color:"#bbb"}}>{live.standing}</div>}
                    </div>
                  </div>
                </div>

                {loading&&(
                  <div style={{textAlign:"center",padding:"40px 0"}}>
                    <div style={{width:"28px",height:"28px",border:"3px solid "+tc+"33",borderTop:"3px solid "+tc,borderRadius:"50%",animation:"spin .8s linear infinite",margin:"0 auto 14px"}}/>
                    <div style={{fontFamily:"monospace",fontSize:"11px",color:"#777"}}>FETCHING LIVE ESPN DATA...</div>
                    <div style={{fontFamily:"monospace",fontSize:"10px",color:"#444",marginTop:"4px"}}>news · stats · roster (first load ~30s)</div>
                  </div>
                )}
                {err&&!loading&&(
                  <div style={{marginBottom:"14px"}}>
                    <div style={{background:"#180808",border:"1px solid #c8102e44",borderRadius:"8px",padding:"14px",fontSize:"12px",color:"#ff8888",fontFamily:"monospace",marginBottom:"10px"}}>⚠ {err}</div>
                    <button className="sp" onClick={()=>{setErr(null);setCache(p=>{const n={...p};delete n[sel.name];return n;});pick(sel);}} style={{background:"#c8102e",border:"none",color:"white",padding:"8px 18px",borderRadius:"6px",cursor:"pointer",fontSize:"12px",fontFamily:"monospace",fontWeight:"bold"}}>RETRY</button>
                  </div>
                )}

                {live&&!loading&&(
                  <div style={{animation:"fadeIn .4s ease"}}>
                    {/* Core stats row */}
                    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"9px",marginBottom:"9px"}}>
                      <Card><Lbl>RECORD</Lbl><div style={{fontSize:"16px",fontWeight:"900",color:"#f0ece4"}}>{live.record||"—"}</div>{live.pct&&<div style={{fontSize:"11px",color:"#888",marginTop:"3px"}}>{(parseFloat(live.pct)*100).toFixed(1)}% win rate</div>}</Card>
                      <Card><Lbl>HEAD COACH</Lbl><div style={{fontSize:"13px",fontWeight:"bold",color:"#f0ece4",lineHeight:1.3}}>{live.coach||"—"}</div><div style={{fontSize:"10px",color:"#555",marginTop:"3px"}}>Blame first</div></Card>
                      <Card><Lbl>HOME VENUE</Lbl><div style={{fontSize:"12px",fontWeight:"bold",color:"#f0ece4",lineHeight:1.3}}>{live.venue||"—"}</div></Card>
                    </div>
                    {live.game&&<Card s={{marginBottom:"9px"}}><Lbl>📡 LATEST GAME</Lbl><div style={{fontSize:"14px",color:"#ddd",lineHeight:1.5}}>{live.game}</div></Card>}

                    {/* Sub-tabs: Hot Takes / Stats / News / Players */}
                    <div style={{display:"flex",gap:"3px",margin:"14px 0 10px",background:"#0d0d0d",padding:"3px",borderRadius:"7px",border:"1px solid #1c1c1c"}}>
                      {[["hottakes","🔥 Hot Takes"],["stats","📊 Stats"],["news","📰 News"],["players","👤 Players"]].map(([k,l])=>{
                        const on=viewTab===k;
                        return<button key={k} className="tb" onClick={()=>setVTab(k)} style={{flex:1,padding:"8px 2px",border:"none",borderRadius:"5px",background:on?"#1c1c1c":"transparent",color:on?"#f0ece4":"#666",fontFamily:"Georgia,serif",fontSize:"11px",fontWeight:on?"bold":"normal",borderBottom:on?"2px solid "+ac:"2px solid transparent",cursor:"pointer"}}>{l}</button>;
                      })}
                    </div>

                    {/* Hot Takes sub-tab */}
                    {viewTab==="hottakes"&&ctx&&(
                      <div style={{animation:"fadeIn .3s ease"}}>
                        <div style={{background:tc+"15",border:"1px solid "+tc+"35",borderRadius:"10px",padding:"16px 18px",marginBottom:"9px"}}>
                          <Lbl>🔥 YOUR READY-MADE HOT TAKE</Lbl>
                          <div style={{fontSize:"15px",fontStyle:"italic",color:"#f0ece4",lineHeight:1.65}}>"{ctx.hotTake}"</div>
                        </div>
                        <Card><Lbl>💡 DROP THIS TO SOUND LEGIT</Lbl><div style={{fontSize:"13px",color:"#ccc",lineHeight:1.6}}>{ctx.keyFact}</div></Card>
                      </div>
                    )}

                    {/* Stats sub-tab */}
                    {viewTab==="stats"&&(
                      <div style={{animation:"fadeIn .3s ease"}}>
                        {live.teamStats&&live.teamStats.length>0?(
                          <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
                            {live.teamStats.map((cat,i)=>(
                              <div key={i}>
                                <div style={{fontSize:"9px",fontFamily:"monospace",color:"#777",letterSpacing:"0.12em",marginBottom:"7px"}}>{(cat.displayName||cat.name||"").toUpperCase()}</div>
                                <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:"6px"}}>
                                  {(cat.stats||[]).filter(s=>s.displayValue&&!["0","--","0.0","0.00"].includes(s.displayValue)).slice(0,8).map((s,j)=>(
                                    <div key={j} style={{background:"#141414",border:"1px solid #2a2a2a",borderRadius:"7px",padding:"9px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                                      <span style={{fontSize:"10px",fontFamily:"monospace",color:"#777"}}>{s.shortDisplayName||s.abbreviation||s.name}</span>
                                      <span style={{fontSize:"14px",fontWeight:"bold",color:"#f0ece4"}}>{s.displayValue}</span>
                                    </div>
                                  ))}
                                </div>
                              </div>
                            ))}
                            {live.teamStatsYear&&<div style={{fontSize:"10px",color:"#333",fontFamily:"monospace",textAlign:"center",marginTop:"8px"}}>{live.teamStatsYear} season · ESPN core API</div>}
                          </div>
                        ):(
                          <div style={{textAlign:"center",padding:"30px",color:"#555",fontFamily:"monospace",fontSize:"12px"}}>Team stats not available for this team/season.</div>
                        )}
                      </div>
                    )}

                    {/* News sub-tab */}
                    {viewTab==="news"&&(
                      <div style={{animation:"fadeIn .3s ease"}}>
                        {live.articles&&live.articles.length>0?(
                          <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
                            {live.articles.map((a,i)=>(
                              <div key={i} style={{background:"#141414",border:"1px solid #2a2a2a",borderLeft:"3px solid "+tc,borderRadius:"8px",padding:"12px 14px"}}>
                                {a.link?(
                                  <a href={a.link} target="_blank" rel="noopener noreferrer" className="news-link">
                                    <div style={{fontSize:"13px",fontWeight:"bold",color:"#f0ece4",lineHeight:1.45,marginBottom:"4px"}}>{a.headline} ↗</div>
                                  </a>
                                ):(
                                  <div style={{fontSize:"13px",fontWeight:"bold",color:"#f0ece4",lineHeight:1.45,marginBottom:"4px"}}>{a.headline}</div>
                                )}
                                {a.desc&&<div style={{fontSize:"12px",color:"#888",lineHeight:1.5,marginTop:"4px"}}>{a.desc.slice(0,120)}{a.desc.length>120?"…":""}</div>}
                                {a.published&&<div style={{fontSize:"10px",color:"#444",fontFamily:"monospace",marginTop:"6px"}}>{a.published}</div>}
                              </div>
                            ))}
                          </div>
                        ):(
                          <div style={{textAlign:"center",padding:"30px",color:"#444",fontFamily:"monospace",fontSize:"12px"}}>No news articles found via ESPN.</div>
                        )}
                        <div style={{marginTop:"10px",padding:"6px",background:"#040404",borderRadius:"5px",border:"1px dashed #1a1a1a",fontSize:"10px",color:"#333",fontFamily:"monospace",textAlign:"center"}}>LIVE NEWS FROM ESPN · LINKS OPEN FULL STORY</div>
                      </div>
                    )}

                    {/* Players sub-tab */}
                    {viewTab==="players"&&(
                      <div style={{animation:"fadeIn .3s ease"}}>
                        {live.players&&live.players.length>0?(
                          <div>
                            <div style={{fontSize:"10px",fontFamily:"monospace",color:"#555",marginBottom:"10px"}}>{live.players.length} PLAYERS WITH LIVE STATS</div>
                            <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
                              {live.players.map((p,i)=>(
                                <div key={i} style={{background:"#141414",border:"1px solid #2a2a2a",borderRadius:"10px",padding:"12px 14px"}}>
                                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
                                    <div style={{fontSize:"14px",fontWeight:"bold",color:"#f0ece4"}}>{p.name}</div>
                                    <div style={{fontSize:"10px",fontFamily:"monospace",color:ac,background:ac+"22",padding:"3px 8px",borderRadius:"4px"}}>{p.jersey?`#${p.jersey} · `:""}{p.pos}</div>
                                  </div>
                                  <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:"5px"}}>
                                    {p.stats.map((s,j)=>(
                                      <div key={j} style={{background:"#0d0d0d",borderRadius:"5px",padding:"7px 10px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                                        <span style={{fontSize:"9px",fontFamily:"monospace",color:"#666"}}>{s.l}</span>
                                        <span style={{fontSize:"12px",fontWeight:"bold",color:"#f0ece4"}}>{s.v}</span>
                                      </div>
                                    ))}
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        ):(
                          <div style={{textAlign:"center",padding:"30px",color:"#555",fontFamily:"monospace",fontSize:"12px"}}>
                            No player stats available via ESPN for this team/season.
                          </div>
                        )}
                        <div style={{marginTop:"10px",padding:"6px",background:"#040404",borderRadius:"5px",border:"1px dashed #1a1a1a",fontSize:"10px",color:"#333",fontFamily:"monospace",textAlign:"center"}}>LIVE STATS FROM ESPN CORE API</div>
                      </div>
                    )}

                    <div style={{marginTop:"10px",padding:"7px",background:"#040404",borderRadius:"6px",border:"1px dashed #1a1a1a",fontSize:"10px",color:"#333",fontFamily:"monospace",textAlign:"center"}}>⚡ sports-proxy-a8md.onrender.com · {new Date().toLocaleDateString()}</div>
                  </div>
                )}
              </div>
            ):(
              /* Grid view */
              <div style={{animation:"fadeIn .4s ease"}}>
                {/* Search + favourites toggle */}
                <div style={{display:"flex",gap:"8px",marginBottom:"12px",flexWrap:"wrap"}}>
                  <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search teams..." style={{flex:1,minWidth:"140px",background:"#141414",border:"1px solid #2a2a2a",borderRadius:"8px",padding:"9px 14px",color:"#f0ece4",fontFamily:"Georgia,serif",fontSize:"13px"}}/>
                  <button className="sp" onClick={()=>{setFavView(f=>!f);setSearch("");}} style={{padding:"9px 16px",borderRadius:"8px",border:"1px solid "+(favView?"#f59e0b":"#2a2a2a"),background:favView?"#f59e0b22":"#141414",color:favView?"#f59e0b":"#bbb",fontSize:"13px",fontFamily:"Georgia,serif",whiteSpace:"nowrap"}}>
                    {favView?"⭐ Favourites":"☆ Favourites"}{favs.length>0&&` (${favs.length})`}
                  </button>
                </div>

                {/* Sport filter */}
                <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"14px"}}>
                  {SPORTS.map(s=>{const on=filter===s;const cnt=ALL_TEAMS.filter(t=>t.sport===s).length;return<button key={s} className="sp" onClick={()=>setFilter(s)} style={{padding:"5px 12px",borderRadius:"20px",border:"1px solid "+(on?"#c8102e":"#2a2a2a"),background:on?"#c8102e":"#141414",color:on?"#fff":"#bbb",fontSize:"11px",fontFamily:"monospace",letterSpacing:"0.05em"}}>{s}{s!=="ALL"?` ${cnt}`:""}</button>;})}
                </div>

                {favView&&favs.length===0&&(
                  <div style={{textAlign:"center",padding:"40px 20px",color:"#555",fontSize:"14px",fontStyle:"italic"}}>
                    No favourites yet — tap ☆ on any team to add it here.
                  </div>
                )}

                <div style={{fontSize:"11px",color:"#444",fontFamily:"monospace",marginBottom:"10px"}}>{filtered.length} team{filtered.length!==1?"s":""}</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(165px,1fr))",gap:"8px"}}>
                  {filtered.map(team=>{
                    const c=cache[team.name];
                    const isFav=favs.includes(team.name);
                    return(
                      <div key={team.name} className="tc" onClick={()=>pick(team)} style={{background:"#111",border:"1.5px solid "+(isFav?"#f59e0b44":"#252525"),borderRadius:"10px",padding:"13px 14px",position:"relative"}}>
                        {isFav&&<span style={{position:"absolute",top:"8px",right:"8px",fontSize:"12px"}}>⭐</span>}
                        <div style={{fontSize:"20px",marginBottom:"4px"}}>{team.emoji}</div>
                        <div style={{fontSize:"12px",fontWeight:"bold",marginBottom:"2px",lineHeight:1.3,color:"#f0ece4",paddingRight:isFav?"16px":"0"}}>{team.name}</div>
                        <div style={{fontSize:"10px",fontFamily:"monospace",color:"#888",letterSpacing:"0.06em"}}>{team.sport}</div>
                        {c?.record?<div style={{marginTop:"5px",fontSize:"11px",color:team.accent,fontFamily:"monospace",fontWeight:"bold"}}>{c.record}</div>:<div style={{marginTop:"5px",fontSize:"10px",color:"#333",fontFamily:"monospace"}}>tap for live stats</div>}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        )}

        {/* ── TIPS TAB ── */}
        {tab==="tips"&&(
          <div style={{animation:"fadeIn .4s ease"}}>
            <div style={{fontSize:"10px",color:"#888",marginBottom:"14px",fontFamily:"monospace",letterSpacing:"0.1em"}}>CLICK TO EXPAND</div>
            {tips.map((sec,i)=>{const open=openTip===i;return(
              <div key={i} className="tip" onClick={()=>setOT(open?null:i)} style={{background:"#111",border:"1px solid #252525",borderLeft:open?"3px solid #c8102e":"3px solid transparent",borderRadius:"8px",marginBottom:"8px",overflow:"hidden"}}>
                <div style={{padding:"14px 17px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:"14px",fontWeight:"bold",color:"#f0ece4"}}>{sec.icon} {sec.category}</span>
                  <span style={{color:"#888",fontSize:"18px"}}>{open?"−":"+"}</span>
                </div>
                {open&&<div style={{padding:"0 17px 17px",animation:"fadeIn .2s ease"}}>
                  {sec.tips.map((tip,j)=><div key={j} style={{padding:"9px 12px",marginBottom:"6px",background:"#0d0d0d",borderRadius:"6px",border:"1px solid #222",fontSize:"13px",lineHeight:1.55,color:"#ddd",display:"flex",gap:"10px"}}>
                    <span style={{color:"#c8102e",flexShrink:0,fontFamily:"monospace"}}>{String(j+1).padStart(2,"0")}</span>{tip}
                  </div>)}
                </div>}
              </div>
            );})}
            <div style={{marginTop:"16px",padding:"16px 18px",background:"#0d0d0d",border:"1px solid #252525",borderTop:"3px solid #c8102e",borderRadius:"8px",fontSize:"13px",color:"#ccc",lineHeight:1.7}}>
              <div style={{color:"#c8102e",fontFamily:"monospace",fontSize:"10px",letterSpacing:"0.2em",marginBottom:"8px"}}>◆ ADVANCED PRO TIP</div>
              The true bandwagon fan never admits to being one. You have "eclectic taste in franchises" and you "appreciate excellence wherever it lives." Internalize this. Say it in the mirror. You are ready.
            </div>
          </div>
        )}

        {/* ── QUIZ TAB ── */}
        {tab==="quiz"&&(
          <div style={{animation:"fadeIn .4s ease"}}>
            {!qDone?(
              <div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
                  <div style={{fontFamily:"monospace",fontSize:"10px",color:"#888",letterSpacing:"0.1em"}}>QUESTION {qStep+1} OF {quiz.length}</div>
                  <div style={{display:"flex",gap:"4px"}}>{quiz.map((_,i)=><div key={i} style={{width:"20px",height:"3px",borderRadius:"2px",background:i<=qStep?"#c8102e":"#2a2a2a",transition:"background .3s"}}/>)}</div>
                </div>
                <div style={{background:"#111",border:"1px solid #252525",borderRadius:"12px",padding:"24px"}}>
                  <p style={{fontSize:"16px",fontWeight:"bold",margin:"0 0 18px",lineHeight:1.45,color:"#f0ece4"}}>{quiz[qStep].q}</p>
                  <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
                    {quiz[qStep].options.map((opt,i)=><button key={i} className="qo" onClick={()=>doQ(quiz[qStep].bandwagon[i])} style={{background:"#0d0d0d",border:"1px solid #2a2a2a",color:"#ddd",padding:"12px 15px",borderRadius:"7px",textAlign:"left",fontSize:"13px",fontFamily:"Georgia,serif",lineHeight:1.45}}>
                      <span style={{color:"#c8102e",fontFamily:"monospace",marginRight:"10px"}}>{String.fromCharCode(65+i)}.</span>{opt}
                    </button>)}
                  </div>
                </div>
              </div>
            ):(()=>{const r=bwLvl();return(
              <div style={{animation:"fadeIn .5s ease"}}>
                <div style={{background:"#111",border:"2px solid "+r.color,borderRadius:"12px",padding:"32px",textAlign:"center"}}>
                  <div style={{fontSize:"44px",marginBottom:"14px"}}>🏆</div>
                  <div style={{fontSize:"10px",letterSpacing:"0.3em",color:"#888",fontFamily:"monospace",marginBottom:"10px"}}>CERTIFICATION LEVEL</div>
                  <div style={{fontSize:"26px",fontWeight:"900",color:r.color,marginBottom:"10px"}}>{r.label}</div>
                  <p style={{color:"#ccc",fontSize:"14px",marginBottom:"20px"}}>{r.desc}</p>
                  <div style={{display:"inline-block",padding:"6px 18px",background:"#0d0d0d",border:"1px solid "+r.color+"55",borderRadius:"20px",fontFamily:"monospace",fontSize:"11px",color:"#aaa"}}>{qScore}/{quiz.length} bandwagon answers</div>
                  <div style={{marginTop:"20px"}}>
                    <button className="sp" onClick={()=>{setQS(0);setQSc(0);setQD(false);}} style={{background:"#c8102e",border:"none",color:"white",padding:"11px 22px",borderRadius:"6px",cursor:"pointer",fontSize:"13px",fontFamily:"Georgia,serif",fontWeight:"bold"}}>Retake (You Can Do Better / Worse)</button>
                  </div>
                </div>
              </div>
            );})()}
          </div>
        )}

        <div style={{textAlign:"center",marginTop:"40px",paddingTop:"16px",borderTop:"1px solid #1a1a1a",fontSize:"10px",color:"#444",fontFamily:"monospace",letterSpacing:"0.08em"}}>
          BANDWAGON BOOTCAMP · {ALL_TEAMS.length} TEAMS · LIVE ESPN · MAY 30 2026 · NO PRIOR LOYALTY REQUIRED
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
